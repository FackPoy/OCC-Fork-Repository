            - name: Checkmarx AST Github Action
  # You may pin to the exact commit or the version.
  # uses: Checkmarx/ast-github-action@e3f1356c077fcb2ad2062ccc8c9f1631bae59128
  uses: Checkmarx/ast-github-action@2.3.36
  with:
    # Provide the AST portal URL
    base_uri: https://sng.ast.checkmarx.net
    # Provide the Tenant for AST portal URL
    cx_tenant: sng_partners
    # Client ID for AST portal authentication
    cx_client_id: ${{ secrets.CX_CLIENT_ID }}
    # Secret key for AST portal authentication
    cx_client_secret: ${{ secrets.CX_CLIENT_SECRET }}
    project_name: WSPH_checkmarx_scan
    # optional, default is ${{ github.repository }}
    # Branch name
    branch: Master
    # optional, default is ${{ github.head_ref || github.ref }}
   
